name: google_play
description: "Making a Google Play clone"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  visibility_detector: ^0.4.0+2
  photo_view: ^0.15.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  google_fonts: ^8.0.2

  # state management
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.0
  # data
  http: ^1.6.0
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0
  riverpod_annotation: ^4.0.2
  faker: ^2.2.0
  # localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_localized_locales: ^2.0.5

dev_dependencies:
  flutter_lints: ^6.0.0

  # generators
  build_runner: ^2.4.10
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    # images
    - assets/images/
    - assets/images/games_screenshots/
    - assets/images/apps_screenshots/
    - assets/images/kids_tab/
    - assets/images/notifications/
    - assets/images/banners/

    # icons
    - assets/icons/
    - assets/icons/apps_icons/
    - assets/icons/books_icons/
    - assets/icons/nav_bar_icons/
    - assets/icons/games_icons/

    # data
    - assets/data/
    - assets/config/

    #fonts
    - assets/google_fonts/
